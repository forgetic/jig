name: ci

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

# Builds are cached transparently by the kache daemon (rustc-wrapper in
# ~/.cargo/config.toml on the host runner), so a clean checkout still gets
# warm builds for everything except final binaries.
#
# jig depends on skein by sibling path (`../skein/crates/skein`), the same
# layout every local checkout of this ecosystem uses. CI reproduces it by
# checking jig out into a `jig/` subdirectory of the workspace with skein
# next to it, so the relative path resolves identically.
jobs:
  validate:
    runs-on: host
    defaults:
      run:
        working-directory: jig
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: jig
      # A second actions/checkout cannot fetch ai/skein: the job token is
      # scoped to ai/jig, so the action's repo lookup 404s. The repo is
      # public, so a plain anonymous clone does the job.
      - name: Checkout skein (sibling path dependency)
        working-directory: .
        run: |
          rm -rf skein
          git clone --depth 1 ${{ github.server_url }}/ai/skein.git skein
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
