name: ci

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

# Builds are cached transparently by the kache daemon (rustc-wrapper in
# ~/.cargo/config.toml on the host runner), so a clean checkout still gets
# warm builds for everything except final binaries.
jobs:
  validate:
    runs-on: host
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Format
        run: cargo fmt --all -- --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
